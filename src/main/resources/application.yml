server:
  port: 8080
  forward-headers-strategy: framework
  servlet:
    context-path: /api

spring:
  application:
    name: link-sphere_BE
  profiles:
    active: secret  # 로컬: application-secret.yml 로딩 / Lambda: 환경변수로 오버라이드
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      minimum-idle: 1        # Lambda는 요청 처리 후 유휴 상태 → idle 커넥션 최소화
      maximum-pool-size: 5   # Lambda 동시 실행 컨테이너 수에 맞게 조정
      idle-timeout: 600000   # 10분
      max-lifetime: 1800000  # 30분
      keepalive-time: 30000  # 30초마다 idle 커넥션 핑 → 유휴 중 끊김 방지
      connection-test-query: SELECT 1  # pool에서 꺼낼 때 연결 유효성 검사 → SnapStart 복원 후 죽은 연결 즉시 교체
      allow-pool-suspension: true  # SnapStart 체크포인트 전 pool 일시 중단 허용 (미설정 시 checkpoint 경고)
  jpa:
    database: POSTGRESQL
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        use_sql_comments: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
  health:
    db:
      enabled: false
    diskSpace:
      enabled: false

app:
  cors:
    allowed-origins:
      - http://localhost:31119
      - https://localhost:31119
      - https://dbw3brui6htwk.cloudfront.net

logging:
  level:
    root: INFO
    com.example.linksphere: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: ERROR
    org.hibernate.type.descriptor.sql: ERROR

gemini:
  api:
    model: gemini-2.5-flash

firebase:
  service-account-key-path: classpath:firebase-service-account.json
