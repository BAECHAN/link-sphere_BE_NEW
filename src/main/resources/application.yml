server:
  port: 51119
  forward-headers-strategy: framework

spring:
  application:
    name: link-sphere_BE
  profiles:
    active: secret
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    database: POSTGRESQL
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
management:
  endpoints:
    web:
      exposure:
        include: health # health 엔드포인트만 활성화
  endpoint:
    health:
      show-details: always # 상세 상태(DB 등)를 확인하려면 설정 (운영 시엔 'when_authorized' 권장)

app:
  cors:
    allowed-origins:
      - http://localhost:31119
      - https://localhost:31119
      - https://dbw3brui6htwk.cloudfront.net

logging:
  level:
    com:
      example:
        linksphere: DEBUG
    org:
      springframework:
        security: DEBUG

gemini:
  api:
    model: gemini-2.5-flash
