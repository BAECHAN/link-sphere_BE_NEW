server:
  port: 51119

spring:
  application:
    name: link-sphere_BE
  profiles:
    active: secret
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    database: POSTGRESQL
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
logging:
  level:
    com:
      example:
        linksphere: DEBUG
    org:
      springframework:
        security: DEBUG

gemini:
  api:
    model: gemini-2.5-flash
