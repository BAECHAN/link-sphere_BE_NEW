server:
  port: 51119
  forward-headers-strategy: framework

spring:
  application:
    name: link-sphere_BE
  profiles:
    active: secret
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      # 리전 간 지연을 고려해 연결 시도 타임아웃을 넉넉히 (기본 30초에서 조정)
      connection-timeout: 30000
      # 유휴 커넥션을 버리지 않고 재사용하도록 유지
      minimum-idle: 5
      maximum-pool-size: 10 # Supabase 무료 티어라면 10~15 정도가 안전합니다
      idle-timeout: 600000 # 10분
      max-lifetime: 1800000 # 30분
  jpa:
    database: POSTGRESQL
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
management:
  endpoints:
    web:
      exposure:
        include: health # health 엔드포인트만 활성화
  endpoint:
    health:
      show-details: always # 상세 상태(DB 등)를 확인하려면 설정 (운영 시엔 'when_authorized' 권장)

app:
  cors:
    allowed-origins:
      - http://localhost:31119
      - https://localhost:31119
      - https://dbw3brui6htwk.cloudfront.net

logging:
  level:
    com:
      example:
        linksphere: DEBUG
    org:
      springframework:
        security: DEBUG

gemini:
  api:
    model: gemini-2.5-flash
