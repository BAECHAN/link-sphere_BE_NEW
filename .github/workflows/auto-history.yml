name: Gemini History Updater

on:
  push:
    tags: ["v*"] # v1.0.0 같은 태그 푸시 시 실행

jobs:
  update-history:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 히스토리 분석을 위해 전체 로그 필요

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: npm install @google/genai # scripts 폴더의 로직을 위한 의존성

      - name: Run History Generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAG_NAME: ${{ github.ref_name }}
        run: node scripts/generate-history.js

      - name: Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Gemini-Bot"
          git add HISTORY.md
          git commit -m "docs: AI-generated history update for ${TAG_NAME} [skip ci]"
          git push origin main
